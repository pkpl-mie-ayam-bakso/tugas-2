<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logout | Tugas Kelompok 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:     'Inter', sans-serif;
      min-height:      100vh;
      display:         flex;
      align-items:     center;
      justify-content: center;
      background:      #F8FAFC;
      position:        relative;
      overflow:        hidden;
    }
    .blob {
      position:      fixed;
      border-radius: 50%;
      filter:        blur(80px);
      opacity:       .3;
      pointer-events:none;
    }
    .blob-1 { width:400px; height:400px; background:#818cf8; top:-80px; left:-80px; }
    .blob-2 { width:350px; height:350px; background:#f472b6; bottom:-60px; right:-60px; }

    .card {
      position:        relative;
      z-index:         1;
      background:      rgba(255,255,255,.9);
      backdrop-filter: blur(20px);
      border:          1px solid rgba(255,255,255,.6);
      border-radius:   24px;
      padding:         2.8rem 2.5rem;
      width:           100%;
      max-width:       400px;
      box-shadow:      0 20px 60px rgba(0,0,0,.1);
      text-align:      center;
      animation:       slideUp .4s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .icon-wrap {
      width:         64px;
      height:        64px;
      background:    linear-gradient(135deg, #f43f5e, #e11d48);
      border-radius: 16px;
      display:       grid;
      place-items:   center;
      font-size:     1.8rem;
      margin:        0 auto 1.2rem;
      box-shadow:    0 8px 24px rgba(244,63,94,.3);
    }

    h1 {
      font-size:     1.5rem;
      font-weight:   800;
      color:         #1e293b;
      margin-bottom: .5rem;
    }
    p {
      color:         rgba(0,0,0,.5);
      font-size:     .92rem;
      margin-bottom: 2rem;
      line-height:   1.6;
    }

    .btn-wrap { display:flex; flex-direction:column; gap:.8rem; }

    .btn {
      display:         flex;
      align-items:     center;
      justify-content: center;
      gap:             .5rem;
      padding:         .85rem 1.5rem;
      border-radius:   12px;
      font-size:       .95rem;
      font-weight:     600;
      cursor:          pointer;
      border:          none;
      transition:      all .25s;
      text-decoration: none;
    }
    .btn-danger {
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color:      white;
      box-shadow: 0 4px 14px rgba(244,63,94,.3);
    }
    .btn-danger:hover {
      transform:       translateY(-1px);
      box-shadow:      0 6px 20px rgba(244,63,94,.4);
      text-decoration: none;
      color:           white;
    }
    .btn-cancel {
      background:  rgba(0,0,0,.06);
      color:       #475569;
    }
    .btn-cancel:hover {
      background:      rgba(0,0,0,.1);
      text-decoration: none;
      color:           #1e293b;
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <h1>Konfirmasi Logout</h1>
  <p>Apakah kamu yakin ingin keluar dari <strong>Kelompok Tugas 2</strong>?</p>

  <div class="btn-wrap">
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger" style="width:100%;">
        Ya, Logout Sekarang
      </button>
    </form>
    <a href="/" class="btn btn-cancel">← Batal, Kembali ke Beranda</a>
  </div>
</div>

</body>
</html>
