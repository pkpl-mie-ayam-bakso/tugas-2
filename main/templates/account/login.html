<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Kelompok Tugas 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family:      'Inter', sans-serif;
      min-height:       100vh;
      display:          flex;
      align-items:      center;
      justify-content:  center;
      background:       #F8FAFC;
      position:         relative;
      overflow:         hidden;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg-blobs {
      position: fixed;
      inset:    0;
      z-index:  0;
      pointer-events: none;
    }
    .blob {
      position:      absolute;
      border-radius: 50%;
      filter:        blur(80px);
      opacity:       .35;
      animation:     float 8s ease-in-out infinite;
    }
    .blob-1 { width:500px; height:500px; background:#818cf8; top:-100px; left:-100px; animation-delay:0s; }
    .blob-2 { width:400px; height:400px; background:#a78bfa; bottom:-80px; right:-80px; animation-delay:2s; }
    .blob-3 { width:300px; height:300px; background:#60a5fa; top:50%;   left:50%;  transform:translate(-50%,-50%); animation-delay:4s; }

    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.05); }
    }
    .blob-3 {
      animation-name: float3;
    }
    @keyframes float3 {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50%      { transform: translate(-50%,-55%) scale(1.08); }
    }

    /* ── CARD ── */
    .login-card {
      position:      relative;
      z-index:       1;
      background:    rgba(255,255,255,.85);
      backdrop-filter: blur(20px);
      border:        1px solid rgba(255,255,255,.6);
      border-radius: 24px;
      padding:       2.8rem 2.5rem;
      width:         100%;
      max-width:     420px;
      box-shadow:    0 20px 60px rgba(79,70,229,.15), 0 4px 16px rgba(0,0,0,.06);
      animation:     slideUp .5s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── HEADER ── */
    .card-header { text-align:center; margin-bottom:2rem; }
    .logo-wrap {
      width:          64px;
      height:         64px;
      background:     linear-gradient(135deg, #4F46E5, #7C3AED);
      border-radius:  16px;
      display:        grid;
      place-items:    center;
      font-size:      1.8rem;
      margin:         0 auto 1.2rem;
      box-shadow:     0 8px 24px rgba(79,70,229,.35);
      animation:      pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 8px 24px rgba(79,70,229,.35); }
      50%      { box-shadow: 0 8px 32px rgba(79,70,229,.55); }
    }
    .card-header h1 {
      font-size:   1.6rem;
      font-weight: 800;
      background:  linear-gradient(135deg, #4F46E5, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .4rem;
    }
    .card-header p {
      font-size: .9rem;
      color:     rgba(0,0,0,.5);
    }

    /* ── DIVIDER ── */
    .divider {
      display:     flex;
      align-items: center;
      gap:         .8rem;
      margin:      1.5rem 0;
      color:       rgba(0,0,0,.35);
      font-size:   .82rem;
      font-weight: 500;
    }
    .divider::before, .divider::after {
      content:    '';
      flex:       1;
      height:     1px;
      background: rgba(0,0,0,.12);
    }

    /* ── GOOGLE BUTTON ── */
    .btn-google {
      display:         flex;
      align-items:     center;
      justify-content: center;
      gap:             .75rem;
      width:           100%;
      padding:         .85rem 1.2rem;
      background:      white;
      border:          2px solid #e2e8f0;
      border-radius:   12px;
      font-size:       .95rem;
      font-weight:     600;
      color:           #1e293b;
      cursor:          pointer;
      transition:      all .25s ease;
      text-decoration: none;
      box-shadow:      0 2px 8px rgba(0,0,0,.06);
      position:        relative;
      overflow:        hidden;
    }
    .btn-google::before {
      content:    '';
      position:   absolute;
      inset:      0;
      background: linear-gradient(135deg, rgba(66,133,244,.06), rgba(52,168,83,.06));
      opacity:    0;
      transition: opacity .25s;
    }
    .btn-google:hover {
      border-color: #4285F4;
      box-shadow:   0 4px 16px rgba(66,133,244,.2);
      transform:    translateY(-1px);
      text-decoration: none;
      color:        #1e293b;
    }
    .btn-google:hover::before { opacity:1; }
    .btn-google:active { transform:translateY(0); }
    .btn-google svg { width:22px; height:22px; flex-shrink:0; }

    /* ── RIPPLE EFFECT ── */
    .btn-google .ripple {
      position:      absolute;
      border-radius: 50%;
      background:    rgba(66,133,244,.25);
      transform:     scale(0);
      animation:     ripple .5s linear;
      pointer-events:none;
    }
    @keyframes ripple {
      to { transform:scale(4); opacity:0; }
    }

    /* ── INFO BOX ── */
    .info-box {
      background:    linear-gradient(135deg, #ede9fe, #e0e7ff);
      border:        1px solid rgba(79,70,229,.2);
      border-radius: 12px;
      padding:       1rem 1.1rem;
      font-size:     .84rem;
      color:         #4c1d95;
      line-height:   1.6;
      margin-top:    1.5rem;
      display:       flex;
      gap:           .6rem;
    }
    .info-box .icon { font-size:1.1rem; flex-shrink:0; margin-top:.1rem; }

    /* ── BACK LINK ── */
    .back-link {
      display:         flex;
      align-items:     center;
      justify-content: center;
      gap:             .4rem;
      margin-top:      1.5rem;
      font-size:       .88rem;
      color:           rgba(0,0,0,.5);
      text-decoration: none;
      transition:      color .2s;
    }
    .back-link:hover { color:#4F46E5; text-decoration:none; }

    /* ── LOADING STATE ── */
    .btn-google.loading {
      pointer-events: none;
      opacity:        .8;
    }
    .spinner {
      display:       none;
      width:         20px;
      height:        20px;
      border:        2px solid rgba(79,70,229,.3);
      border-top:    2px solid #4F46E5;
      border-radius: 50%;
      animation:     spin .7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .btn-google.loading .spinner         { display:block; }
    .btn-google.loading .google-icon     { display:none; }
    .btn-google.loading .btn-text::after { content:' ...'; }

    /* ── SECURITY BADGES ── */
    .security-row {
      display:         flex;
      justify-content: center;
      gap:             1.2rem;
      margin-top:      1.5rem;
    }
    .sec-badge {
      display:     flex;
      align-items: center;
      gap:         .3rem;
      font-size:   .75rem;
      color:       rgba(0,0,0,.4);
      font-weight: 500;
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Login Card -->
<div class="login-card">

  <div class="card-header">
    <div class="logo-wrap">🔐</div>
    <h1>Selamat Datang</h1>
    <p>Tugas 2 — Authentication &amp; Authorization</p>
  </div>

  <!-- Google Login -->
  <a href="{% url 'google_login' %}" class="btn-google" id="googleBtn">
    <span class="spinner"></span>
    <span class="google-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </span>
    <span class="btn-text">Masuk dengan Google</span>
  </a>

  <div class="divider">hanya untuk anggota kelompok</div>

  <div class="info-box">
    <span class="icon">🛡️</span>
    <span>
      Login menggunakan <strong>OAuth 2.0 Google</strong>. Hanya akun yang terdaftar sebagai
      anggota kelompok yang dapat mengubah tampilan website.
    </span>
  </div>

  <a href="/" class="back-link">
    ← Kembali ke Beranda
  </a>

  <div class="security-row">
    <div class="sec-badge">🔒 HTTPS</div>
    <div class="sec-badge">🛡️ OAuth 2.0</div>
    <div class="sec-badge">✅ CSRF Protected</div>
  </div>

</div>

<script>
  // Ripple effect
  const btn = document.getElementById('googleBtn');
  btn.addEventListener('click', function(e) {
    // Loading state
    this.classList.add('loading');

    // Ripple
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width  = ripple.style.height = size + 'px';
    ripple.style.left   = (e.clientX - rect.left - size/2) + 'px';
    ripple.style.top    = (e.clientY - rect.top  - size/2) + 'px';
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
</script>

</body>
</html>
